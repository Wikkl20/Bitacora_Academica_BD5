<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Bitácora Académica</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100">

  <!-- NAVBAR -->
  <nav class="bg-blue-600 text-white p-4 flex justify-between">
    <h1 class="text-xl font-bold">Bitácora Académica</h1>
    <a href="login.html" class="bg-white text-blue-600 px-4 py-2 rounded hover:bg-gray-200">
      Iniciar Sesión
    </a>
  </nav>

  <!-- HERO -->
  <section class="text-center py-20">
    <h2 class="text-4xl font-bold mb-4">Bienvenido a tu Bitácora</h2>
    <p class="text-gray-600 mb-6">
      Visualiza tu progreso académico semanal de manera organizada
    </p>

    <a href="login.html" class="bg-blue-600 text-white px-6 py-3 rounded-lg text-lg hover:bg-blue-700">
      Comenzar
    </a>
  </section>

  <!-- INFO -->
  <section class="grid grid-cols-1 md:grid-cols-3 gap-6 px-10 pb-20">

    <div class="bg-white p-6 rounded shadow">
      <h3 class="font-bold text-lg mb-2">📚 Unidades</h3>
      <p>Organiza tu aprendizaje por bloques del curso.</p>
    </div>

    <div class="bg-white p-6 rounded shadow">
      <h3 class="font-bold text-lg mb-2">📅 Semanas</h3>
      <p>Registra tu progreso académico semanal.</p>
    </div>

    <div class="bg-white p-6 rounded shadow">
      <h3 class="font-bold text-lg mb-2">📂 Contenidos</h3>
      <p>Accede a PDFs, videos y recursos.</p>
    </div>

  </section>

</body>
</html>
